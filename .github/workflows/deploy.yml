# Free static hosting on GitHub Pages.
#
# Publishes ./dist on every push to main. REQUIRED: repo Settings → Pages →
# Build and deployment → Source = "GitHub Actions".
# If Source is "Deploy from a branch" (main /), GitHub will serve the raw Vue
# source index.html instead of this artifact — the site breaks.
#
# BASE_PATH is set to the repo name for project pages (https://<user>.github.io/<repo>/).
# If you attach a custom domain (see CNAME note in README), remove BASE_PATH so
# assets resolve from the domain root "/".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build + smoke
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
