<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="IB">
  <defs>
    <!-- Polymer scale finish — indigo body with clearcoat sheen -->
    <linearGradient id="plate" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e6afe"/>
      <stop offset="42%" stop-color="#4d48fc"/>
      <stop offset="100%" stop-color="#3530c8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="12" y1="6" x2="40" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ink" x1="18" y1="16" x2="46" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe0b8"/>
      <stop offset="55%" stop-color="#fdcb93"/>
      <stop offset="100%" stop-color="#e8a86a"/>
    </linearGradient>
  </defs>
  <!-- Squared polymer plate (matches multi-tool scale corner language) -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#plate)"/>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#sheen)"/>
  <!-- Soft bevel rim -->
  <rect
    x="5.5"
    y="5.5"
    width="53"
    height="53"
    rx="10.5"
    fill="none"
    stroke="#2a268f"
    stroke-opacity="0.35"
    stroke-width="1.2"
  />
  <rect
    x="6.5"
    y="6.5"
    width="51"
    height="51"
    rx="9.5"
    fill="none"
    stroke="#a8a5ff"
    stroke-opacity="0.22"
    stroke-width="1"
  />
  <!-- Engraved IB — peach ink on polymer, mono weight -->
  <text
    x="32"
    y="40.5"
    text-anchor="middle"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.04em"
    fill="url(#ink)"
  >IB</text>
</svg>
